# Use packaged themes so the candidate window renders consistently on a fresh install.
Theme=default
DarkTheme=default-dark
UseDarkTheme=True
UseAccentColor=False
Font="Noto Sans CJK SC 12"
MenuFont="Noto Sans CJK SC 12"
TrayFont="JetBrains Mono Bold 10"
TrayOutlineColor=#232136
TrayTextColor=#e0def4
PreferTextIcon=True
ShowLayoutNameInIcon=True
PerScreenDPI=True
EnableFractionalScale=True
