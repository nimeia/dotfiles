[main]
font=JetBrains Mono:size=11
terminal=ghostty -e
prompt=run > 
width=42
lines=12
horizontal-pad=18
vertical-pad=12
inner-pad=8
image-size-ratio=0.35
line-height=22
layer=overlay
match-mode=fzf
sort-result=yes

[colors]
background=0f1419f2
text=d7e0eaff
prompt=7dd3fcff
placeholder=8b98a8ff
input=d7e0eaff
match=7dd3fcff
selection=1d2630ff
selection-text=ffffffff
selection-match=a7f3d0ff
counter=8b98a8ff
border=7dd3fcff

[border]
width=2
radius=8
